<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="8" fill="#020409"/>
  <!-- Cardinal rays (N/S/E/W) -->
  <line x1="32" y1="6"  x2="32" y2="14" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="50" x2="32" y2="58" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="6"  y1="32" x2="14" y2="32" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="50" y1="32" x2="58" y2="32" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Diagonal rays -->
  <line x1="13" y1="13" x2="19" y2="19" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="45" y1="45" x2="51" y2="51" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="51" y1="13" x2="45" y2="19" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="13" y1="51" x2="19" y2="45" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Sun core -->
  <defs>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="60%"  stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#CC3300"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="12" fill="url(#sun)"/>
</svg>